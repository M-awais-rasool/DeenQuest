# Air: core service — from backend/: air -c dev/air/core-service.toml  (or: make air-core)
# Makefile sets WHISPER_URL=http://localhost:8001 for local dev.
root = "."
tmp_dir = "tmp/air-core-service"

[build]
  bin = "./tmp/air-core-service/core-service"
  cmd = "go build -o ./tmp/air-core-service/core-service ./cmd/core-service"
  delay = 500
  exclude_dir = ["tmp", "vendor", "whisper-service", "build", ".git", "docs", "dev/air"]
  exclude_regex = ["_test\\.go"]
  include_ext = ["go", "mod", "sum"]
  send_interrupt = true
  kill_delay = "800ms"
  stop_on_error = true

[log]
  main_only = false
  time = true

[misc]
  clean_on_exit = true
