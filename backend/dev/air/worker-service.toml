# Air: worker service — from backend/: air -c dev/air/worker-service.toml  (or: make air-worker)
root = "."
tmp_dir = "tmp/air-worker-service"

[build]
  bin = "./tmp/air-worker-service/worker-service"
  cmd = "go build -o ./tmp/air-worker-service/worker-service ./cmd/worker-service"
  delay = 500
  exclude_dir = ["tmp", "vendor", "whisper-service", "build", ".git", "docs", "dev/air"]
  exclude_regex = ["_test\\.go"]
  include_ext = ["go", "mod", "sum"]
  send_interrupt = true
  kill_delay = "800ms"
  stop_on_error = true

[log]
  main_only = false
  time = true

[misc]
  clean_on_exit = true
