# Air: API gateway — from backend/: air -c dev/air/gateway.toml  (or: make air-gateway)
root = "."
tmp_dir = "tmp/air-gateway"

[build]
  bin = "./tmp/air-gateway/gateway"
  cmd = "go build -o ./tmp/air-gateway/gateway ./cmd/gateway"
  delay = 500
  exclude_dir = ["tmp", "vendor", "whisper-service", "build", ".git", "docs", "dev/air"]
  exclude_regex = ["_test\\.go"]
  include_ext = ["go", "mod", "sum"]
  send_interrupt = true
  kill_delay = "800ms"
  stop_on_error = true

[log]
  main_only = false
  time = true

[misc]
  clean_on_exit = true
